<!DOCTYPE html>

<head>
    
    <title>Expense Tracker</title>
    
</head>
<body>
    <h1 style="text-align:center">Expense Tracker</h1>
    <div class="form-container">
        <form id="expense-form">
            <div>
                <label for="expense">choose expense amount: </label>
                <input type="number" id="expense" name="expense" required>
                <label for="description">Description: </label>
                <input type="text" id="description" name="description" required>                  
                <label for="type">Choose expense type:</label>
                  <select name="type" id="type">
                    <option value="fuel">fuel</option>
                    <option value="food">food</option>
                    <option value="electricity">electricity</option>
                    <option value="movie">movie</option>
                  </select>
            <button type="submit">Add Expense</button>
          </div>
        </form>
    </div>
    <div class="expenses" id="expenses-list">


    </div>

    <script src="/src/index.js"></script>
</body>
</html>
